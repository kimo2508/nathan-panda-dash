<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Panda Dash">
<title>Nathan's Panda Dash</title>
<style>
html,body{margin:0;padding:0;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;font-family:system-ui,sans-serif;overflow:hidden;touch-action:none;-webkit-touch-callout:none;}
h1{color:#f4c535;font-size:20px;margin-bottom:6px;letter-spacing:1px;}
@media(display-mode:standalone){h1{padding-top:env(safe-area-inset-top,0);}}
#wrap{position:relative;width:100vw;max-width:1024px;}
canvas{display:block;width:100%;border-radius:0;}
#ui{position:absolute;top:10px;left:0;right:0;display:flex;justify-content:center;padding:0 12px;pointer-events:none;gap:6px;flex-wrap:wrap;}
.stat{background:rgba(0,0,0,0.6);color:#fff;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;}
.stat b{color:#f4c535;}
#djBar{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.55);border-radius:10px;padding:4px 12px;color:#fff;font-size:11px;display:flex;align-items:center;gap:6px;pointer-events:none;}
.pip{width:11px;height:11px;border-radius:50%;background:#f4c535;display:inline-block;border:1.5px solid #c8860a;}
.pip-used{background:#444!important;border-color:#222!important;}
#controls{position:absolute;bottom:8px;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-end;padding:0 14px;}
#btnGroup{display:flex;gap:10px;}
.cbtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-radius:14px;border:2.5px solid rgba(255,255,255,0.4);background:rgba(0,0,0,0.6);color:#fff;cursor:pointer;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}
.cbtn-move{width:76px;height:76px;}
.cbtn-jump{width:96px;height:96px;border-radius:50%;background:rgba(244,197,53,0.3);border:3px solid #f4c535;}
.cbtn span.icon{font-size:24px;line-height:1;}
.cbtn span.lbl{font-size:10px;font-weight:700;letter-spacing:.5px;color:rgba(255,255,255,0.75);}
.cbtn-jump span.lbl{color:#f4c535;}
#overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;padding:20px;z-index:20;}
#overlay h2{font-size:26px;margin-bottom:6px;}
#overlay p{font-size:13px;color:#ccc;margin-bottom:14px;line-height:1.7;}
#overlay button{background:#f4c535;color:#222;border:none;padding:12px 36px;border-radius:24px;font-size:17px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent;}
#hsBlock{width:100%;margin-bottom:12px;max-width:280px;}
#hsBlock h3{color:#f4c535;font-size:14px;margin-bottom:6px;}
.hs-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 8px;}
.hs-row:nth-child(odd){background:rgba(255,255,255,0.07);border-radius:6px;}
#topBtns{position:absolute;top:10px;right:10px;display:flex;gap:6px;z-index:30;}
.tbtn{background:rgba(0,0,0,0.55);color:#fff;border:1.5px solid rgba(255,255,255,0.3);border-radius:20px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;}
</style>
</head>
<body>
<h1>🐼 Nathan's Panda Dash</h1>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="ui">
    <div class="stat">Score: <b id="sc">0</b></div>
    <div class="stat">🐼 x <b id="lv">3</b></div>
    <div class="stat">Best: <b id="bst">0</b></div>
    <div class="stat" id="lvl">Lvl 1</div>
  </div>
  <div id="topBtns">
    <div class="tbtn" id="pauseBtn">⏸ Pause</div>
    <div class="tbtn" id="muteBtn">🔊</div>
  </div>
  <div id="djBar">Jump: <span class="pip" id="p1"></span><span class="pip" id="p2"></span></div>
  <div id="controls">
    <div id="btnGroup">
      <div class="cbtn cbtn-move" id="bL"><span class="icon">◀</span><span class="lbl">LEFT</span></div>
      <div class="cbtn cbtn-move" id="bR"><span class="icon">▶</span><span class="lbl">RIGHT</span></div>
    </div>
    <div class="cbtn cbtn-jump" id="bJ"><span class="icon">▲</span><span class="lbl">JUMP</span></div>
  </div>
  <div id="overlay">
    <h2 id="ot">Nathan's Panda Dash!</h2>
    <p id="op">Dodge or stomp tigers and wolves!<br>Collect bamboo for points.<br><b>Tap JUMP twice</b> to double jump!<br>Jump ON enemies to squish them!<br><br>❤️ Extra life · 🛡️ Shield · ⚡ Speed</p>
    <div id="hsBlock" style="display:none"></div>
    <button id="ob">Let's Go! 🐼</button>
  </div>
</div>
<script>
(function(){
var cv=document.getElementById('c'),ctx=cv.getContext('2d');
var dpr=Math.min(window.devicePixelRatio||1,2);
var W=960,H=440;cv.width=W*dpr;cv.height=H*dpr;cv.style.width='100%';cv.style.height='auto';
ctx.scale(dpr,dpr);
var GROUND=H-70;
var PC=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c'];
var state='menu',score=0,lives=3,level=1,paused=false;
var kL=false,kR=false;
var highScores=[];
var P,plats,obs,coins,pwups,parts,floats,flagX,camX=0,tCamX=0;
var shakeX=0,shakeY=0,shakeT=0;
var muted=false;
var AC=window.AudioContext||window.webkitAudioContext;
var actx=null;

// World themes
var themes=[
  {sky1:'#b8e4f0',sky2:'#e8f7e0',ground1:'#4e9e2d',ground2:'#469128',groundTop:'#5ca832',treeTrunk:'#4e9e2d',treeLeaf:'rgba(100,200,60,0.55)',name:'Bamboo Forest'},
  {sky1:'#d4e5f7',sky2:'#eef4fa',ground1:'#e0ddd4',ground2:'#ccc8be',groundTop:'#d6d2c8',treeTrunk:'#b0a89a',treeLeaf:'rgba(180,200,220,0.5)',name:'Snowy Mountains'},
  {sky1:'#fce4b8',sky2:'#f7dcb0',ground1:'#d4a44c',ground2:'#c4943c',groundTop:'#dab060',treeTrunk:'#8B6914',treeLeaf:'rgba(200,170,80,0.5)',name:'Sandy Desert'},
  {sky1:'#1a1a3e',sky2:'#2a2a4e',ground1:'#2a2a4e',ground2:'#222244',groundTop:'#333366',treeTrunk:'#444477',treeLeaf:'rgba(80,80,140,0.5)',name:'Midnight Run'},
  {sky1:'#f7cfd8',sky2:'#fde8ec',ground1:'#d4728c',ground2:'#c4627c',groundTop:'#e07898',treeTrunk:'#a04060',treeLeaf:'rgba(220,140,160,0.5)',name:'Cherry Blossom'}
];

// Load saved high scores
try{var saved=localStorage.getItem('panda_hs');if(saved)highScores=JSON.parse(saved);}catch(e){}
if(highScores.length>0)document.getElementById('bst').textContent=highScores[0].s;

// ── AUDIO ────────────────────────────────────────────
function ga(){if(!actx)actx=new AC();if(actx.state==='suspended')actx.resume();return actx;}
function tone(f,tp,d,v,sf){
  if(muted)return;try{var a=ga(),o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.type=tp||'sine';
  if(sf){o.frequency.setValueAtTime(sf,a.currentTime);o.frequency.exponentialRampToValueAtTime(f,a.currentTime+d*.5);}
  else o.frequency.setValueAtTime(f,a.currentTime);
  g.gain.setValueAtTime(v||.12,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);
  o.start(a.currentTime);o.stop(a.currentTime+d);}catch(e){}
}
function noise(d,v){
  if(muted)return;try{var a=ga(),b=a.createBuffer(1,a.sampleRate*d,a.sampleRate),dd=b.getChannelData(0);
  for(var i=0;i<dd.length;i++)dd[i]=Math.random()*2-1;
  var s=a.createBufferSource();s.buffer=b;var g=a.createGain();s.connect(g);g.connect(a.destination);
  g.gain.setValueAtTime(v||.1,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);
  s.start();s.stop(a.currentTime+d);}catch(e){}
}
function sfxJump(){tone(320,'sine',.12,.1,200);}
function sfxDJump(){tone(520,'sine',.15,.1,320);setTimeout(function(){tone(640,'sine',.1,.08);},80);}
function sfxCoin(){tone(880,'sine',.07,.08);setTimeout(function(){tone(1100,'sine',.07,.08);},60);setTimeout(function(){tone(1320,'sine',.09,.1);},120);}
function sfxHit(){noise(.18,.15);tone(120,'sawtooth',.2,.08);}
function sfxDie(){tone(300,'sawtooth',.1,.1);setTimeout(function(){tone(220,'sawtooth',.1,.08);},100);setTimeout(function(){tone(150,'sawtooth',.2,.08);},200);}
function sfxLvl(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){tone(f,'sine',.15,.1);},i*100);});}
function sfxStomp(){tone(200,'square',.06,.12);setTimeout(function(){tone(400,'sine',.1,.08);},50);setTimeout(function(){tone(600,'sine',.08,.06);},100);}
function sfxPwup(t){
  if(t==='life')[523,659,784,1047,1319].forEach(function(f,i){setTimeout(function(){tone(f,'sine',.1,.1);},i*70);});
  else if(t==='shield'){tone(440,'square',.05,.06);setTimeout(function(){tone(660,'square',.05,.06);},50);setTimeout(function(){tone(880,'square',.08,.08);},100);}
  else{tone(800,'sawtooth',.05,.06);setTimeout(function(){tone(1000,'sawtooth',.05,.06);},40);setTimeout(function(){tone(1200,'sine',.08,.08);},80);}
}

var musicOn=false,musicTmr=null;
var mel=[[523,.18],[523,.18],[659,.18],[659,.18],[784,.18],[784,.18],[659,.36],[587,.18],[587,.18],[523,.18],[523,.18],[440,.18],[440,.18],[523,.36],[784,.18],[659,.18],[523,.18],[440,.18],[523,.18],[659,.18],[784,.36],[880,.18],[784,.18],[659,.18],[523,.18],[587,.18],[523,.18],[440,.36]];
var bass=[[130,.36],[165,.36],[196,.36],[130,.36],[110,.36],[130,.36],[98,.36],[130,.36],[165,.36],[196,.36],[220,.36],[196,.36],[165,.36],[130,.36]];

function startMus(){
  if(muted||musicOn)return;musicOn=true;
  var mi=0,bi=0;
  function sched(){
    if(muted||!musicOn)return;
    try{var a=ga(),n=a.currentTime;
    var m=mel[mi%mel.length];
    var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);
    o.type='triangle';o.frequency.value=m[0];
    g.gain.setValueAtTime(.05,n);g.gain.exponentialRampToValueAtTime(.001,n+m[1]);
    o.start(n);o.stop(n+m[1]);mi++;
    if(mi%2===0){var b=bass[bi%bass.length];
      var o2=a.createOscillator(),g2=a.createGain();o2.connect(g2);g2.connect(a.destination);
      o2.type='sine';o2.frequency.value=b[0];
      g2.gain.setValueAtTime(.06,n);g2.gain.exponentialRampToValueAtTime(.001,n+b[1]);
      o2.start(n);o2.stop(n+b[1]);bi++;}
    musicTmr=setTimeout(sched,m[1]*1000);}catch(e){}
  }
  sched();
}
function stopMus(){musicOn=false;if(musicTmr)clearTimeout(musicTmr);}

document.getElementById('muteBtn').addEventListener('click',function(){
  muted=!muted;this.textContent=muted?'🔇':'🔊';
  if(muted)stopMus();else if(state==='play')startMus();
});

document.getElementById('pauseBtn').addEventListener('click',function(){
  if(state==='play'){state='paused';paused=true;stopMus();this.textContent='▶ Play';}
  else if(state==='paused'){state='play';paused=false;startMus();this.textContent='⏸ Pause';}
});

// ── GAME ─────────────────────────────────────────────
function rnd(n){return Math.floor(Math.random()*n);}

// Generate terrain gaps
function genTerrain(lvl){
  var segs=[];var cx=0;
  // Always start with solid ground
  segs.push({x:0,w:400,type:'ground'});cx=400;
  var total=flagX+200;
  while(cx<total){
    if(Math.random()<0.2+lvl*0.03&&cx>300){
      // Gap
      var gw=60+rnd(40+lvl*10);
      segs.push({x:cx,w:gw,type:'gap'});cx+=gw;
    }
    // Ground
    var gw=200+rnd(300);
    segs.push({x:cx,w:gw,type:'ground'});cx+=gw;
  }
  return segs;
}

var terrain;

function init(lvl){
  camX=0;tCamX=0;shakeT=0;
  P={x:80,y:GROUND-44,w:32,h:40,vx:0,vy:0,onGround:false,wobble:0,facing:1,dead:false,inv:0,jumps:2,shield:0,speed:0,runFrame:0};
  plats=[];obs=[];coins=[];pwups=[];parts=[];floats=[];
  flagX=1600+lvl*250;
  terrain=genTerrain(lvl);

  // Platforms on top of terrain, near gaps for helpfulness
  for(var i=0;i<6+lvl;i++){
    plats.push({x:250+i*180+rnd(50),y:GROUND-70-rnd(70),w:90+rnd(40),h:14,color:PC[i%PC.length],vx:lvl>2?(Math.random()>.5?.6:-.6):0,ox:0,range:50+rnd(30)});
  }

  // Enemies — patrol type + charging type
  var spd=1.4+lvl*.3,cnt=Math.min(2+lvl,8);
  for(var i=0;i<cnt;i++){
    var ex=500+i*(350+rnd(200));
    obs.push({
      x:ex,y:GROUND-32,w:28,h:34,
      vx:spd*(.7+rnd(30)/100),
      type:rnd(2), // 0=tiger 1=wolf
      wob:rnd(628)/100,
      patrol:Math.random()>.4, // patrol back and forth vs charge
      patrolOrigin:ex,patrolRange:80+rnd(80),
      dir:-1,squished:false,squishT:0,
      alive:true
    });
  }

  // Coins placed near platforms and on ground
  for(var i=0;i<12;i++){
    coins.push({x:180+i*180+rnd(60),y:GROUND-50-rnd(90),r:10,got:false,bob:rnd(628)/100});
  }

  var types=['life','shield','speed'];
  for(var i=0;i<2+lvl;i++){
    pwups.push({x:500+i*400+rnd(150),y:GROUND-80-rnd(60),type:types[i%3],r:14,got:false,bob:rnd(628)/100,pulse:0});
  }

  document.getElementById('lvl').textContent='Lvl '+lvl;
  document.getElementById('lv').textContent=lives;
  document.getElementById('sc').textContent=score;
  updPips();
}

function updPips(){
  document.getElementById('p1').className='pip'+(P.jumps>=1?'':' pip-used');
  document.getElementById('p2').className='pip'+(P.jumps>=2?'':' pip-used');
}

function burst(x,y,col,n){for(var i=0;i<n;i++)parts.push({x:x,y:y,vx:(Math.random()-.5)*6,vy:-Math.random()*7-2,col:col,life:1,r:3+rnd(4)});}

function addFloat(x,y,txt,col){floats.push({x:x,y:y,txt:txt,col:col,life:1});}

function doJump(){
  if(P.jumps>0){
    if(P.jumps===1)sfxDJump();else sfxJump();
    P.vy=P.jumps===2?-12.5:-10;
    P.jumps--;P.onGround=false;
    burst(P.x+P.w/2,P.y+P.h,P.jumps===1?'#adf':'#fff',5);
    updPips();
  }
}

function shake(dur){shakeT=dur;}

function isOverGap(x,w){
  for(var i=0;i<terrain.length;i++){
    var s=terrain[i];
    if(s.type==='gap'&&x+w>s.x&&x<s.x+s.w)return true;
  }
  return false;
}

// ── UPDATE ───────────────────────────────────────────
function update(){
  if(state!=='play')return;
  if(shakeT>0){shakeT--;shakeX=(Math.random()-.5)*6;shakeY=(Math.random()-.5)*4;}
  else{shakeX=0;shakeY=0;}

  if(P.inv>0)P.inv--;
  if(P.shield>0)P.shield--;
  if(P.speed>0)P.speed--;
  var spd=P.speed>0?5.5:3.8;
  if(kL){P.vx=-spd;P.facing=-1;}
  else if(kR){P.vx=spd;P.facing=1;}
  else P.vx*=.72;
  P.vy+=.55;if(P.vy>14)P.vy=14;
  P.x+=P.vx;P.y+=P.vy;P.wobble+=.14;
  if(Math.abs(P.vx)>1)P.runFrame+=.2;

  P.onGround=false;

  // Ground collision with gaps
  if(P.y+P.h>=GROUND+36){
    if(!isOverGap(P.x+4,P.w-8)){
      P.y=GROUND+36-P.h;P.vy=0;
      if(!P.onGround){P.jumps=2;updPips();}
      P.onGround=true;
    }
  }
  if(P.x<10)P.x=10;

  // Platform collision
  plats.forEach(function(p){
    if(p.vx!==0){p.ox+=p.vx;if(Math.abs(p.ox)>p.range)p.vx*=-1;p.x+=p.vx;}
    var ox=P.x+P.w>p.x&&P.x<p.x+p.w;
    var oy=P.y+P.h>=p.y&&P.y+P.h<=p.y+p.h+10&&P.vy>=0;
    if(ox&&oy){P.y=p.y-P.h;P.vy=0;if(!P.onGround){P.jumps=2;updPips();}P.onGround=true;if(p.vx!==0)P.x+=p.vx;}
  });

  // Enemies
  obs.forEach(function(o){
    if(!o.alive){o.squishT--;return;}
    o.wob+=.08;
    if(o.patrol){
      o.x+=o.vx*o.dir;
      if(o.x<o.patrolOrigin-o.patrolRange||o.x>o.patrolOrigin+o.patrolRange)o.dir*=-1;
    }else{
      o.x-=o.vx;
      if(o.x+o.w<camX-150){o.x=camX+W+200+rnd(300);o.vx=(1.4+level*.3)*(.7+rnd(40)/100);}
    }

    if(!P.dead&&P.inv===0){
      var hitX=P.x<o.x+o.w-5&&P.x+P.w>o.x+5;
      var hitY=P.y+P.h>o.y+5&&P.y<o.y+o.h;

      // Stomp check — player falling and feet above enemy midpoint
      if(hitX&&P.vy>0&&P.y+P.h>=o.y&&P.y+P.h<=o.y+o.h*.6){
        // STOMP!
        o.alive=false;o.squished=true;o.squishT=40;
        sfxStomp();
        P.vy=-9; // bounce up
        score+=25;
        document.getElementById('sc').textContent=score;
        addFloat(o.x,o.y-10,'+25','#f4c535');
        burst(o.x+o.w/2,o.y+o.h/2,o.type===0?'#f39c12':'#7f8c8d',10);
      }
      else if(hitX&&hitY){
        if(P.shield>0){
          P.shield=0;burst(P.x+P.w/2,P.y+P.h/2,'#3498db',20);sfxHit();
          o.x=camX+W+300;
        }else{
          sfxHit();shake(12);
          burst(P.x+P.w/2,P.y+P.h/2,'#e74c3c',14);
          lives--;document.getElementById('lv').textContent=lives;
          P.inv=100;
          if(lives<=0){P.dead=true;sfxDie();saveScore();setTimeout(gameOver,1400);}
          else{P.x=Math.max(90,camX+90);P.y=GROUND-60;P.vy=-5;}
        }
      }
    }
  });

  // Remove fully squished enemies
  obs=obs.filter(function(o){return o.alive||o.squishT>0;});

  // Coins
  coins.forEach(function(c){
    c.bob+=.08;
    if(!c.got){
      var dx=P.x+P.w/2-c.x,dy=P.y+P.h/2-c.y;
      if(Math.sqrt(dx*dx+dy*dy)<c.r+18){
        c.got=true;score+=10;sfxCoin();
        document.getElementById('sc').textContent=score;
        if(score>(highScores[0]?highScores[0].s:0))document.getElementById('bst').textContent=score;
        burst(c.x,c.y,'#f4c535',6);
        addFloat(c.x,c.y-10,'+10','#f4c535');
      }
    }
  });

  // Power-ups
  pwups.forEach(function(pw){
    pw.bob+=.07;pw.pulse+=.1;
    if(!pw.got){
      var dx=P.x+P.w/2-pw.x,dy=P.y+P.h/2-pw.y;
      if(Math.sqrt(dx*dx+dy*dy)<pw.r+16){
        pw.got=true;sfxPwup(pw.type);
        burst(pw.x,pw.y,pw.type==='life'?'#e74c3c':pw.type==='shield'?'#3498db':'#f39c12',16);
        if(pw.type==='life'){lives=Math.min(lives+1,5);document.getElementById('lv').textContent=lives;addFloat(pw.x,pw.y-10,'+1 Life','#e74c3c');}
        else if(pw.type==='shield'){P.shield=300;addFloat(pw.x,pw.y-10,'Shield!','#3498db');}
        else{P.speed=300;addFloat(pw.x,pw.y-10,'Speed!','#f39c12');}
      }
    }
  });

  // Floating text
  floats=floats.filter(function(f){return f.life>0;});
  floats.forEach(function(f){f.y-=1.2;f.life-=.025;});

  // Particles
  parts=parts.filter(function(p){return p.life>0;});
  parts.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.life-=.038;});

  // Camera — more lead room
  tCamX=Math.max(0,P.x-250);camX+=(tCamX-camX)*.08;

  // Level complete
  if(P.x>flagX-30){
    sfxLvl();score+=150*level;level++;
    document.getElementById('sc').textContent=score;
    if(score>(highScores[0]?highScores[0].s:0))document.getElementById('bst').textContent=score;
    var th=themes[Math.min(level-1,themes.length-1)];
    showOvl('Level Complete! 🐼','+'+(150*(level-1))+' bamboo bonus!<br>Next: '+th.name,'Next Level',function(){init(level);state='play';});
  }
  // Fall death
  if(P.y>H+120){
    lives--;document.getElementById('lv').textContent=lives;
    if(lives<=0){P.dead=true;sfxDie();saveScore();setTimeout(gameOver,800);}
    else{sfxHit();shake(8);P.x=Math.max(90,camX+90);P.y=GROUND-80;P.vy=-4;P.inv=80;}
  }
}

function saveScore(){
  if(score===0)return;
  highScores.push({n:'Nathan 🐼',s:score});
  highScores.sort(function(a,b){return b.s-a.s;});
  if(highScores.length>5)highScores=highScores.slice(0,5);
  document.getElementById('bst').textContent=highScores[0].s;
  try{localStorage.setItem('panda_hs',JSON.stringify(highScores));}catch(e){}
}

function gameOver(){
  stopMus();
  var html='<h3 style="color:#f4c535;margin-bottom:8px;">🏆 High Scores</h3>';
  var med=['🥇','🥈','🥉'];
  highScores.slice(0,5).forEach(function(s,i){
    html+='<div class="hs-row"><span>'+(i<3?med[i]:(i+1)+'.')+'</span><span>'+s.n+'</span><span style="color:#f4c535;font-weight:700">'+s.s+'</span></div>';
  });
  var hb=document.getElementById('hsBlock');hb.innerHTML=html;hb.style.display='block';
  showOvl('Game Over! 🐼','Nathan scored '+score+' points!','Play Again',function(){
    hb.style.display='none';score=0;lives=3;level=1;init(level);state='play';startMus();
  });
}

// ── DRAW ─────────────────────────────────────────────
function getTheme(){return themes[Math.min(level-1,themes.length-1)%themes.length];}

function drawBg(){
  var th=getTheme();
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,th.sky1);g.addColorStop(1,th.sky2);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // Stars for night theme
  if(th.name==='Midnight Run'){
    ctx.fillStyle='rgba(255,255,255,0.7)';
    for(var si=0;si<30;si++){
      var sx2=((si*97+23)%W+W)%W;
      var sy2=((si*53+11)%(GROUND-40));
      ctx.fillRect(sx2,sy2,2,2);
    }
  }

  // Parallax mountains
  ctx.fillStyle=th.name==='Midnight Run'?'rgba(40,40,80,0.5)':'rgba(0,0,0,0.06)';
  for(var mx=((-camX*.03)%300+600)%300-300;mx<W+300;mx+=300){
    ctx.beginPath();ctx.moveTo(mx,GROUND+20);
    ctx.lineTo(mx+60,GROUND-100);ctx.lineTo(mx+140,GROUND-70);
    ctx.lineTo(mx+200,GROUND-120);ctx.lineTo(mx+300,GROUND+20);
    ctx.closePath();ctx.fill();
  }

  // Parallax hills
  ctx.fillStyle=th.name==='Midnight Run'?'rgba(50,50,90,0.4)':'rgba(0,0,0,0.04)';
  for(var hx=((-camX*.06)%250+500)%250-250;hx<W+250;hx+=250){
    ctx.beginPath();ctx.moveTo(hx,GROUND+36);
    ctx.quadraticCurveTo(hx+60,GROUND-40,hx+120,GROUND+36);
    ctx.fill();
  }

  // Clouds
  ctx.fillStyle=th.name==='Midnight Run'?'rgba(60,60,100,0.3)':'rgba(255,255,255,0.55)';
  [[80,48,110,16],[310,32,90,13],[540,58,120,18]].forEach(function(c){
    var ox=((c[0]-camX*.05)%(W+400)+W+400)%(W+400);
    ctx.beginPath();ctx.ellipse(ox,c[1],c[2],c[3],0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(ox+30,c[1]-10,c[2]*.65,c[3]*.75,0,0,Math.PI*2);ctx.fill();
  });

  // Trees
  var th2=getTheme();
  for(var bx=((-camX*.15)%180+360)%180-180;bx<W+100;bx+=180){
    ctx.fillStyle=th2.treeTrunk;ctx.fillRect(bx+5,GROUND-90,7,90);
    ctx.fillStyle=th2.treeLeaf;
    ctx.beginPath();ctx.ellipse(bx+20,GROUND-80,20,8,.4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(bx-10,GROUND-55,16,7,-.3,0,Math.PI*2);ctx.fill();
  }
}

function drawGround(){
  var th=getTheme();
  // Draw terrain segments
  terrain.forEach(function(seg){
    if(seg.type==='gap')return;
    var sx=seg.x-camX;
    if(sx>W+50||sx+seg.w<-50)return;
    for(var gx=Math.max(0,sx);gx<Math.min(W,sx+seg.w);gx+=64){
      ctx.fillStyle=(Math.floor((gx+camX)/64)%2===0)?th.ground1:th.ground2;
      ctx.fillRect(gx,GROUND+36,64,H-GROUND-36);
    }
    ctx.fillStyle=th.groundTop;
    ctx.fillRect(Math.max(0,sx),GROUND+34,Math.min(W,sx+seg.w)-Math.max(0,sx),5);
  });
}

function drawPanda(x,y,w,h,facing,wobble,dead,inv,shield,speed,runFrame){
  if(inv>0&&Math.floor(inv/4)%2===0)return;
  ctx.save();ctx.translate(x+w/2,y+h/2);
  if(dead)ctx.rotate(Math.PI/2);
  var sq=1+Math.sin(wobble)*.05;
  ctx.scale(facing*sq,1/sq);

  // Shield bubble
  if(shield>0){
    ctx.strokeStyle='rgba(52,152,219,'+(0.3+Math.sin(wobble*3)*.3)+')';
    ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(0,2,w/2+10,h/2+10,0,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(52,152,219,0.08)';ctx.beginPath();ctx.ellipse(0,2,w/2+10,h/2+10,0,0,Math.PI*2);ctx.fill();
  }

  // Speed trail
  if(speed>0){
    ctx.fillStyle='rgba(243,156,18,0.12)';
    for(var ti=1;ti<=3;ti++){ctx.beginPath();ctx.ellipse(-ti*8,2,w/2,h/2,0,0,Math.PI*2);ctx.fill();}
  }

  // Body
  ctx.fillStyle='#fff';ctx.strokeStyle='#333';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.ellipse(0,2,w/2,h/2,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='#f0f0f0';ctx.beginPath();ctx.ellipse(0,6,w/2*.5,h/2*.42,0,0,Math.PI*2);ctx.fill();

  // Ears
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.arc(-w/2*.54,-h/2*.76,8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(w/2*.54,-h/2*.76,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#555';
  ctx.beginPath();ctx.arc(-w/2*.54,-h/2*.76,4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(w/2*.54,-h/2*.76,4,0,Math.PI*2);ctx.fill();

  // Eye patches
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.ellipse(-w/2*.28,-h/2*.2,7.5,6.5,-.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(w/2*.28,-h/2*.2,7.5,6.5,.3,0,Math.PI*2);ctx.fill();

  // Eyes — blinking
  var blink=(Math.floor(wobble*2)%60===0);
  ctx.fillStyle='#fff';
  if(blink){
    ctx.fillStyle='#222';
    ctx.fillRect(-w/2*.35,-h/2*.22,w/2*.15,2);
    ctx.fillRect(w/2*.2,-h/2*.22,w/2*.15,2);
  }else{
    ctx.beginPath();ctx.arc(-w/2*.28,-h/2*.2,4.2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(w/2*.28,-h/2*.2,4.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';
    ctx.beginPath();ctx.arc(-w/2*.2,-h/2*.2,2.4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(w/2*.36,-h/2*.2,2.4,0,Math.PI*2);ctx.fill();
  }

  // Nose
  ctx.fillStyle='#e8aaa0';ctx.beginPath();ctx.ellipse(0,-h/2*.02,4,3,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#666';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.arc(0,h/2*.07,5,.2,Math.PI-.2);ctx.stroke();

  // Arms — swing while running
  var armSwing=Math.sin(runFrame)*0.4;
  ctx.fillStyle='#222';
  ctx.save();ctx.rotate(armSwing);
  ctx.beginPath();ctx.ellipse(-w/2*.7,h/2*.1,6,10,.4,0,Math.PI*2);ctx.fill();
  ctx.restore();
  ctx.save();ctx.rotate(-armSwing);
  ctx.beginPath();ctx.ellipse(w/2*.7,h/2*.1,6,10,-.4,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // Legs — alternate while running
  var legSwing=Math.sin(runFrame)*5;
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.ellipse(-w/2*.3,h/2*.82+legSwing,7,8,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(w/2*.3,h/2*.82-legSwing,7,8,0,0,Math.PI*2);ctx.fill();

  // Name tag
  if(!dead){
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.beginPath();ctx.roundRect(-22,-h/2-20,44,16,6);ctx.fill();
    ctx.fillStyle='#f4c535';ctx.font='bold 9px system-ui';ctx.textAlign='center';
    ctx.fillText('Nathan',0,-h/2-8);
  }
  ctx.restore();
}

function drawEnemy(o,camX){
  if(!o.alive){
    // Squished animation
    if(o.squishT>0){
      var sx=o.x-camX;
      ctx.save();ctx.translate(sx+o.w/2,o.y+o.h);
      ctx.scale(1.5,0.2);ctx.globalAlpha=o.squishT/40;
      ctx.fillStyle=o.type===0?'#f39c12':'#7f8c8d';
      ctx.beginPath();ctx.ellipse(0,0,o.w/2,o.h/2,0,0,Math.PI*2);ctx.fill();
      ctx.restore();ctx.globalAlpha=1;
    }
    return;
  }
  var sx=o.x-camX;
  var facing=o.patrol?o.dir:-1;
  ctx.save();ctx.translate(sx+o.w/2,o.y+o.h/2);ctx.scale(facing,1);
  ctx.translate(0,Math.sin(o.wob)*3);

  // Walk cycle
  var legW=Math.sin(o.wob*2)*4;

  if(o.type===0){
    // Tiger
    ctx.fillStyle='#f39c12';ctx.strokeStyle='#333';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.ellipse(0,0,o.w/2,o.h/2,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=2;
    [-5,0,5].forEach(function(s){ctx.beginPath();ctx.moveTo(s,-o.h/2+6);ctx.lineTo(s+2,o.h/2-5);ctx.stroke();});
    // Ears
    ctx.fillStyle='#e67e22';
    ctx.beginPath();ctx.moveTo(-o.w/2*.4,-o.h/2*.65);ctx.lineTo(-o.w/2*.6,-o.h/2*1.1);ctx.lineTo(-o.w/2*.1,-o.h/2*.8);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(o.w/2*.4,-o.h/2*.65);ctx.lineTo(o.w/2*.6,-o.h/2*1.1);ctx.lineTo(o.w/2*.1,-o.h/2*.8);ctx.closePath();ctx.fill();
    // Eyes
    ctx.fillStyle='#27ae60';
    ctx.beginPath();ctx.ellipse(-o.w/2*.25,-o.h/2*.18,4.5,3.5,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(o.w/2*.25,-o.h/2*.18,4.5,3.5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';
    ctx.beginPath();ctx.arc(-o.w/2*.25,-o.h/2*.18,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(o.w/2*.25,-o.h/2*.18,2,0,Math.PI*2);ctx.fill();
    // Mouth — open when near Nathan
    var dist=Math.abs(P.x-(o.x));
    if(dist<150){
      ctx.fillStyle='#c0392b';ctx.beginPath();ctx.ellipse(0,o.h/2*.15,6,4,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.moveTo(-4,o.h/2*.1);ctx.lineTo(-3,o.h/2*.22);ctx.lineTo(-2,o.h/2*.1);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(2,o.h/2*.1);ctx.lineTo(3,o.h/2*.22);ctx.lineTo(4,o.h/2*.1);ctx.closePath();ctx.fill();
    }else{
      ctx.fillStyle='#fde3a7';ctx.beginPath();ctx.ellipse(0,o.h/2*.08,7,5,0,0,Math.PI*2);ctx.fill();
    }
    // Legs
    ctx.fillStyle='#e67e22';
    ctx.beginPath();ctx.ellipse(-o.w/2*.35,o.h/2*.75+legW,5,7,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(o.w/2*.35,o.h/2*.75-legW,5,7,0,0,Math.PI*2);ctx.fill();
  }else{
    // Wolf
    ctx.fillStyle='#7f8c8d';ctx.strokeStyle='#333';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.ellipse(0,0,o.w/2,o.h/2,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle='#bdc3c7';ctx.beginPath();ctx.ellipse(0,4,o.w/2*.5,o.h/2*.4,0,0,Math.PI*2);ctx.fill();
    // Ears
    ctx.fillStyle='#636e72';
    ctx.beginPath();ctx.moveTo(-o.w/2*.35,-o.h/2*.6);ctx.lineTo(-o.w/2*.55,-o.h/2*1.15);ctx.lineTo(-o.w/2*.05,-o.h/2*.7);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(o.w/2*.35,-o.h/2*.6);ctx.lineTo(o.w/2*.55,-o.h/2*1.15);ctx.lineTo(o.w/2*.05,-o.h/2*.7);ctx.closePath();ctx.fill();
    ctx.fillStyle='#e88';
    ctx.beginPath();ctx.moveTo(-o.w/2*.33,-o.h/2*.68);ctx.lineTo(-o.w/2*.48,-o.h/2*1.05);ctx.lineTo(-o.w/2*.1,-o.h/2*.76);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(o.w/2*.33,-o.h/2*.68);ctx.lineTo(o.w/2*.48,-o.h/2*1.05);ctx.lineTo(o.w/2*.1,-o.h/2*.76);ctx.closePath();ctx.fill();
    // Eyes
    ctx.fillStyle='#f39c12';
    ctx.beginPath();ctx.ellipse(-o.w/2*.25,-o.h/2*.18,4.5,3.5,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(o.w/2*.25,-o.h/2*.18,4.5,3.5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';
    ctx.beginPath();ctx.arc(-o.w/2*.25,-o.h/2*.18,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(o.w/2*.25,-o.h/2*.18,2,0,Math.PI*2);ctx.fill();
    // Snout
    var dist2=Math.abs(P.x-o.x);
    if(dist2<150){
      ctx.fillStyle='#636e72';ctx.beginPath();ctx.ellipse(0,o.h/2*.1,8,6,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#c0392b';ctx.beginPath();ctx.ellipse(0,o.h/2*.15,5,3,0,0,Math.PI*2);ctx.fill();
    }else{
      ctx.fillStyle='#95a5a6';ctx.beginPath();ctx.ellipse(0,o.h/2*.1,8,6,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#555';ctx.beginPath();ctx.ellipse(0,o.h/2*.02,4,3,0,0,Math.PI*2);ctx.fill();
    }
    // Legs
    ctx.fillStyle='#636e72';
    ctx.beginPath();ctx.ellipse(-o.w/2*.35,o.h/2*.75+legW,5,7,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(o.w/2*.35,o.h/2*.75-legW,5,7,0,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawPwup(pw){
  if(pw.got)return;
  var sx=pw.x-camX,cy=pw.y+Math.sin(pw.bob)*6;
  var pulse=.7+Math.sin(pw.pulse)*.3;
  ctx.save();ctx.translate(sx,cy);ctx.scale(pulse,pulse);
  ctx.strokeStyle=pw.type==='life'?'rgba(231,76,60,0.5)':pw.type==='shield'?'rgba(52,152,219,0.5)':'rgba(243,156,18,0.5)';
  ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,pw.r+4,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle=pw.type==='life'?'#e74c3c':pw.type==='shield'?'#3498db':'#f39c12';
  ctx.beginPath();ctx.arc(0,0,pw.r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 14px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(pw.type==='life'?'❤️':pw.type==='shield'?'🛡️':'⚡',0,1);
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save();ctx.translate(shakeX,shakeY);
  drawBg();
  plats.forEach(function(p){
    var sx=p.x-camX;
    if(sx>W+50||sx+p.w<-50)return;
    ctx.fillStyle=p.color;ctx.beginPath();ctx.roundRect(sx,p.y,p.w,p.h,6);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.25)';ctx.fillRect(sx+6,p.y+3,p.w-12,4);
  });
  drawGround();

  // Gap warning lines
  terrain.forEach(function(seg){
    if(seg.type!=='gap')return;
    var sx=seg.x-camX;
    if(sx>W+50||sx+seg.w<-50)return;
    ctx.strokeStyle='rgba(255,60,60,0.25)';ctx.lineWidth=1;
    ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(sx,GROUND+36);ctx.lineTo(sx,H);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx+seg.w,GROUND+36);ctx.lineTo(sx+seg.w,H);ctx.stroke();
    ctx.setLineDash([]);
  });

  obs.forEach(function(o){drawEnemy(o,camX);});
  coins.forEach(function(c){
    if(c.got)return;
    var cy2=c.y+Math.sin(c.bob)*5,sx=c.x-camX;
    ctx.fillStyle='#4e9e2d';ctx.fillRect(sx-3,cy2-c.r,6,c.r*2);
    ctx.fillStyle='#6abf42';ctx.fillRect(sx-3,cy2-c.r+2,6,4);ctx.fillRect(sx-3,cy2+2,6,4);
    ctx.fillStyle='rgba(100,200,60,0.7)';
    ctx.beginPath();ctx.ellipse(sx+10,cy2-4,9,4,.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(sx-10,cy2+4,9,4,-.3,0,Math.PI*2);ctx.fill();
  });
  pwups.forEach(function(pw){drawPwup(pw);});

  // Flag
  var fx=flagX-camX;
  if(fx>-50&&fx<W+120){
    ctx.fillStyle='#555';ctx.fillRect(fx,GROUND-95,6,95);
    ctx.fillStyle='#e74c3c';
    ctx.beginPath();ctx.moveTo(fx+6,GROUND-95);ctx.lineTo(fx+38,GROUND-77);ctx.lineTo(fx+6,GROUND-58);ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 10px system-ui';ctx.textAlign='center';
    ctx.fillText('GOAL',fx+16,GROUND+12);
  }

  drawPanda(P.x-camX,P.y,P.w,P.h,P.facing,P.wobble,P.dead,P.inv,P.shield,P.speed,P.runFrame);

  // Particles
  parts.forEach(function(p){
    ctx.globalAlpha=p.life;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x-camX,p.y,p.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // Floating score text
  floats.forEach(function(f){
    ctx.globalAlpha=f.life;ctx.fillStyle=f.col;
    ctx.font='bold 14px system-ui';ctx.textAlign='center';
    ctx.fillText(f.txt,f.x-camX,f.y);
  });
  ctx.globalAlpha=1;

  // Power-up bars
  if(P.shield>0){
    ctx.fillStyle='rgba(52,152,219,0.7)';ctx.beginPath();ctx.roundRect(10,H-18,P.shield/300*100,7,4);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='9px system-ui';ctx.textAlign='left';ctx.fillText('🛡️',10,H-22);
  }
  if(P.speed>0){
    ctx.fillStyle='rgba(243,156,18,0.7)';ctx.beginPath();ctx.roundRect(120,H-18,P.speed/300*100,7,4);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='9px system-ui';ctx.textAlign='left';ctx.fillText('⚡',120,H-22);
  }
  ctx.restore();
}

function loop(){update();draw();requestAnimationFrame(loop);}

function showOvl(title,body,btn,cb){
  state='pause';
  document.getElementById('ot').textContent=title;
  document.getElementById('op').innerHTML=body;
  document.getElementById('ob').textContent=btn;
  document.getElementById('ob').onclick=function(){document.getElementById('overlay').style.display='none';cb();};
  document.getElementById('overlay').style.display='flex';
  document.getElementById('pauseBtn').textContent='⏸ Pause';
}

// Controls
function addBtn(el,d,u){
  el.addEventListener('touchstart',function(e){e.preventDefault();d();},{passive:false});
  el.addEventListener('touchend',function(e){e.preventDefault();u();},{passive:false});
  el.addEventListener('touchcancel',function(e){e.preventDefault();u();},{passive:false});
  el.addEventListener('mousedown',function(e){e.preventDefault();d();});
  el.addEventListener('mouseup',function(e){e.preventDefault();u();});
  el.addEventListener('mouseleave',function(){u();});
}
addBtn(document.getElementById('bL'),function(){kL=true;},function(){kL=false;});
addBtn(document.getElementById('bR'),function(){kR=true;},function(){kR=false;});
addBtn(document.getElementById('bJ'),function(){if(state==='play')doJump();},function(){});

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'||e.key==='a')kL=true;
  if(e.key==='ArrowRight'||e.key==='d')kR=true;
  if(e.key==='ArrowUp'||e.key===' '||e.key==='w'){if(state==='play')doJump();}
  if(e.key==='p'||e.key==='Escape'){document.getElementById('pauseBtn').click();}
  e.preventDefault();
});
document.addEventListener('keyup',function(e){
  if(e.key==='ArrowLeft'||e.key==='a')kL=false;
  if(e.key==='ArrowRight'||e.key==='d')kR=false;
});

document.getElementById('ob').onclick=function(){
  ga();document.getElementById('overlay').style.display='none';
  init(level);state='play';startMus();
};

init(1);loop();
})();
</script>
</body>
